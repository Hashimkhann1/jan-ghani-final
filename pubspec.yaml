name: jan_ghani_final
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.2.4
  uuid: ^4.5.3
  dropdown_search: ^7.0.0
  printing: ^5.14.3
  pdf: ^3.12.0
  postgres: ^3.5.9
  crypto: ^3.0.7
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.4
  connectivity_plus: ^6.1.3
#  flutter_libserialport: ^0.6.0
  qr_flutter: ^4.1.0
  barcode: ^2.2.9
  barcode_widget: ^2.0.4
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/jan_ghani.png"
  min_sdk_android: 23
  windows:
    generate: true
    image_path: "assets/images/jan_ghani.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/jan_ghani.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/json/